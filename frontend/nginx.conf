server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: React Router handles paths client-side.
    # Without this, refreshing /dashboard returns a 404 from nginx
    # because there's no actual file at that path — only index.html exists.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tell browsers to cache static assets aggressively.
    # Vite fingerprints filenames (e.g. main-abc123.js) so stale cache is never an issue.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Compress text responses
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
}
